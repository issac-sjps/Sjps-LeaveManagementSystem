<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>校內老師管理｜新莊國小</title>
<link rel="stylesheet" href="../css/main.css">
<style>
.page-toolbar { display:flex; align-items:center; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
.search-box { position:relative; flex:1; min-width:180px; max-width:280px; }
.search-box input { padding-left:30px; }
.search-icon { position:absolute; left:9px; top:50%; transform:translateY(-50%); color:var(--gray-400); font-size:14px; pointer-events:none; }

.teacher-table { width:100%; border-collapse:collapse; font-size:13px; }
.teacher-table th { background:var(--gray-50); color:var(--gray-600); font-size:11px; font-weight:500; padding:8px 12px; text-align:left; border-bottom:1px solid var(--gray-200); white-space:nowrap; }
.teacher-table td { padding:10px 12px; border-bottom:1px solid var(--gray-100); vertical-align:middle; }
.teacher-table tr:hover td { background:var(--gray-50); }

.form-grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:0 14px; }
.form-grid-2 .full { grid-column:1/-1; }
.radio-group { display:flex; gap:16px; }
.radio-group label { display:flex; align-items:center; gap:6px; font-size:13px; cursor:pointer; }
</style>
</head>
<body>

<div class="pw-screen" id="pw-screen">
  <div class="pw-logo">新莊國小</div>
  <div class="pw-school">代理代課管理系統</div>
  <div style="font-size:12px;color:var(--gray-500);">請輸入校內密碼以繼續</div>
  <div class="pw-box">
    <input type="password" class="pw-input" id="pw-input" placeholder="••••••••" autocomplete="off">
    <button class="btn btn-primary" id="pw-btn">進入</button>
  </div>
  <div class="pw-error" id="pw-error"></div>
</div>

<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="school">高雄市左營區</div>
      <div class="system">新莊國小代課系統</div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer" id="sidebar-footer"></div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <div>
        <div class="topbar-title">校內老師管理</div>
        <div class="topbar-sub" id="count-label">載入中…</div>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-primary" id="btn-add">＋ 新增校內老師</button>
      </div>
    </div>

    <div class="page-body">
      <div class="page-toolbar">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input class="form-control" id="search-input" placeholder="搜尋姓名…">
        </div>
        <select class="form-control form-select" id="filter-gender" style="width:100px">
          <option value="">全部性別</option>
          <option value="male">男</option>
          <option value="female">女</option>
        </select>
        <select class="form-control form-select" id="filter-role" style="width:120px">
          <option value="">全部職稱</option>
          <option value="homeroom">導師</option>
          <option value="subject">科任</option>
          <option value="admin">行政</option>
        </select>
      </div>

      <div class="card" style="padding:0;overflow:hidden">
        <div style="overflow-x:auto">
          <table class="teacher-table" id="teacher-table">
            <thead>
              <tr>
                <th>姓名</th>
                <th>性別</th>
                <th>職稱</th>
                <th>班級</th>
                <th>任教科目</th>
                <th>學歷代號</th>
                <th>電話</th>
                <th>Email</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="teacher-tbody">
              <tr><td colspan="9" class="text-muted text-sm" style="padding:20px">載入中…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Edit modal -->
<div class="modal-backdrop hidden" id="edit-modal">
  <div class="modal" style="max-width:520px">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">新增校內老師</div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="form-grid-2">
      <div class="form-group full">
        <label class="form-label">姓名 *</label>
        <input class="form-control" id="f-name" placeholder="輸入姓名">
      </div>
      <div class="form-group">
        <label class="form-label">性別 *</label>
        <div class="radio-group">
          <label><input type="radio" name="gender" value="male" checked><span>男</span></label>
          <label><input type="radio" name="gender" value="female"><span>女</span></label>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">職稱 *</label>
        <select class="form-control form-select" id="f-role">
          <option value="homeroom">導師</option>
          <option value="subject">科任</option>
          <option value="admin">行政</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">任教班級</label>
        <input class="form-control" id="f-class" placeholder="如：三年甲班">
      </div>
      <div class="form-group">
        <label class="form-label">任教科目</label>
        <input class="form-control" id="f-subject" placeholder="如：數學、自然">
      </div>
      <div class="form-group">
        <label class="form-label">學歷代號
          <span class="text-xs text-muted">（1–6，影響鐘點費）</span>
        </label>
        <select class="form-control form-select" id="f-edu">
          <option value="1">1 - 碩士／有教師證</option>
          <option value="2">2 - 碩士／無教師證</option>
          <option value="3">3 - 大學／有教師證（檢定）</option>
          <option value="4" selected>4 - 大學／有教師證（登記）</option>
          <option value="5">5 - 大學／已修師資課程</option>
          <option value="6">6 - 大學／未修師資課程</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">電話</label>
        <input class="form-control" id="f-phone" placeholder="0912-345-678">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-control" id="f-email" type="email">
      </div>
      <div class="form-group full">
        <label class="form-label">備註</label>
        <textarea class="form-control" id="f-notes" rows="2"></textarea>
      </div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px">
      <button class="btn btn-secondary" id="modal-cancel">取消</button>
      <button class="btn btn-primary" id="modal-save">儲存</button>
    </div>
  </div>
</div>

<!-- Delete modal -->
<div class="modal-backdrop hidden" id="del-modal">
  <div class="modal" style="max-width:360px">
    <div class="modal-header">
      <div class="modal-title">確認刪除</div>
      <button class="modal-close" id="del-close">✕</button>
    </div>
    <p style="font-size:14px;color:var(--gray-700);margin-bottom:16px">
      確定要刪除 <strong id="del-name"></strong>？<br>
      <span style="font-size:12px;color:var(--danger)">此操作無法復原。</span>
    </p>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-secondary" id="del-cancel">取消</button>
      <button class="btn btn-danger" id="del-confirm">確認刪除</button>
    </div>
  </div>
</div>

<script type="module">
import { initLayout } from "../js/layout.js";
import { db } from "../js/firebase-config.js";
import { isAdmin } from "../js/auth.js";
import { collection, getDocs, doc, setDoc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

initLayout("school-teachers");

const ROLE_LABEL = { homeroom:"導師", subject:"科任", admin:"行政" };
let allTeachers = [];
let editingId = null;
let deleteId  = null;

async function loadTeachers() {
  const snap = await getDocs(collection(db, "schoolTeachers"));
  allTeachers = snap.docs.map(d=>({id:d.id,...d.data()}));
  document.getElementById("count-label").textContent = `共 ${allTeachers.length} 位校內老師`;
  renderTable();
}

function renderTable() {
  const search = document.getElementById("search-input").value.trim().toLowerCase();
  const gender = document.getElementById("filter-gender").value;
  const role   = document.getElementById("filter-role").value;
  const filtered = allTeachers.filter(t => {
    if (search && !t.name?.toLowerCase().includes(search)) return false;
    if (gender && t.gender !== gender) return false;
    if (role   && t.role   !== role)   return false;
    return true;
  });
  const tbody = document.getElementById("teacher-tbody");
  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="9" class="text-muted text-sm" style="padding:20px;text-align:center">沒有符合條件的老師</td></tr>`;
    return;
  }
  tbody.innerHTML = "";
  filtered.forEach(t => {
    const nameClass = t.gender==="female" ? "name-female" : "name-male";
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td><span class="${nameClass}">${t.name||"—"}</span></td>
      <td>${t.gender==="female"?"女":"男"}</td>
      <td><span class="tag ${t.role==="homeroom"?"tag-blue":t.role==="admin"?"tag-amber":"tag-gray"}">${ROLE_LABEL[t.role]||"—"}</span></td>
      <td>${t.className||"—"}</td>
      <td>${t.subject||"—"}</td>
      <td>${t.eduCode||"—"}</td>
      <td>${t.phone||"—"}</td>
      <td>${t.email||"—"}</td>
      <td style="white-space:nowrap">
        <button class="btn btn-secondary btn-sm" data-edit="${t.id}">編輯</button>
        <button class="btn btn-danger btn-sm" data-del="${t.id}" data-name="${t.name}" style="margin-left:4px">刪除</button>
      </td>`;
    tr.querySelector("[data-edit]").addEventListener("click", ()=>openEdit(t));
    tr.querySelector("[data-del]").addEventListener("click",  ()=>openDelete(t));
    tbody.appendChild(tr);
  });
}

function clearForm() {
  ["f-name","f-class","f-subject","f-phone","f-email","f-notes"].forEach(id=>document.getElementById(id).value="");
  document.querySelector('input[name="gender"][value="male"]').checked = true;
  document.getElementById("f-role").value = "homeroom";
  document.getElementById("f-edu").value  = "4";
}

function openAdd() {
  editingId = null;
  document.getElementById("modal-title").textContent = "新增校內老師";
  clearForm();
  document.getElementById("edit-modal").classList.remove("hidden");
}
function openEdit(t) {
  editingId = t.id;
  document.getElementById("modal-title").textContent = "編輯校內老師";
  document.getElementById("f-name").value    = t.name    ||"";
  document.getElementById("f-class").value   = t.className||"";
  document.getElementById("f-subject").value = t.subject ||"";
  document.getElementById("f-phone").value   = t.phone   ||"";
  document.getElementById("f-email").value   = t.email   ||"";
  document.getElementById("f-notes").value   = t.notes   ||"";
  document.getElementById("f-role").value    = t.role    ||"homeroom";
  document.getElementById("f-edu").value     = String(t.eduCode||"4");
  document.querySelectorAll('input[name="gender"]').forEach(r=>r.checked=r.value===(t.gender||"male"));
  document.getElementById("edit-modal").classList.remove("hidden");
}
function closeModal() { document.getElementById("edit-modal").classList.add("hidden"); editingId=null; }

async function save() {
  const name = document.getElementById("f-name").value.trim();
  if (!name) { alert("請輸入姓名"); return; }
  const data = {
    name,
    gender:    document.querySelector('input[name="gender"]:checked')?.value||"male",
    role:      document.getElementById("f-role").value,
    className: document.getElementById("f-class").value.trim(),
    subject:   document.getElementById("f-subject").value.trim(),
    eduCode:   Number(document.getElementById("f-edu").value),
    phone:     document.getElementById("f-phone").value.trim(),
    email:     document.getElementById("f-email").value.trim(),
    notes:     document.getElementById("f-notes").value.trim(),
    updatedAt: new Date().toISOString(),
  };
  try {
    if (editingId) { await setDoc(doc(db,"schoolTeachers",editingId),data,{merge:true}); }
    else { data.createdAt=new Date().toISOString(); await addDoc(collection(db,"schoolTeachers"),data); }
    closeModal();
    await loadTeachers();
  } catch(e) { alert("儲存失敗："+e.message); }
}

function openDelete(t) {
  deleteId = t.id;
  document.getElementById("del-name").textContent = t.name;
  document.getElementById("del-modal").classList.remove("hidden");
}
async function confirmDelete() {
  if (!deleteId) return;
  try {
    await deleteDoc(doc(db,"schoolTeachers",deleteId));
    document.getElementById("del-modal").classList.add("hidden");
    deleteId=null;
    await loadTeachers();
  } catch(e) { alert("刪除失敗："+e.message); }
}

document.getElementById("btn-add").addEventListener("click", openAdd);
document.getElementById("modal-close").addEventListener("click", closeModal);
document.getElementById("modal-cancel").addEventListener("click", closeModal);
document.getElementById("modal-save").addEventListener("click", save);
document.getElementById("edit-modal").addEventListener("click", e=>{ if(e.target===e.currentTarget) closeModal(); });
document.getElementById("del-close").addEventListener("click",  ()=>document.getElementById("del-modal").classList.add("hidden"));
document.getElementById("del-cancel").addEventListener("click", ()=>document.getElementById("del-modal").classList.add("hidden"));
document.getElementById("del-confirm").addEventListener("click", confirmDelete);
["search-input","filter-gender","filter-role"].forEach(id=>document.getElementById(id).addEventListener("input",renderTable));

setTimeout(()=>{ if(!isAdmin()) document.getElementById("btn-add").style.display="none"; },1500);
await loadTeachers();
</script>
</body>
</html>
