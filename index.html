<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>代課管理系統｜新莊國小</title>
<link rel="stylesheet" href="css/main.css">
<style>
.home-grid {
  display: grid;
  grid-template-columns: 230px 1fr;
  gap: 16px;
  align-items: start;
}

/* ── Teacher panel ── */
.teacher-panel { position: sticky; top: calc(var(--topbar-h) + 20px); }
.teacher-list {
  display: flex; flex-direction: column; gap: 3px;
  max-height: calc(100vh - 210px); overflow-y: auto; padding-right: 2px;
}
.teacher-row {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; border-radius: var(--radius-sm);
  cursor: pointer; border: 1px solid transparent;
  transition: background 0.12s, border-color 0.12s;
}
.teacher-row:hover { background: var(--gray-50); border-color: var(--gray-200); }
.teacher-row.has-class { background: var(--success-light); }
.teacher-name { font-size: 13px; font-weight: 500; flex: 1; }
.teacher-meta { font-size: 10px; color: var(--gray-500); }
.teacher-today { font-size: 10px; color: var(--success); }
.filter-bar { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
.filter-toggle {
  font-size: 11px; padding: 3px 10px; border-radius: 20px;
  border: 1px solid var(--gray-300); background: #fff;
  cursor: pointer; color: var(--gray-600); transition: all 0.12s;
}
.filter-toggle.active { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }

/* ── 4-week calendar ── */
.cal-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.cal-nav { display: flex; gap: 4px; }
.cal-nav button {
  padding: 5px 12px; border: 1px solid var(--gray-300);
  background: #fff; border-radius: var(--radius-sm);
  cursor: pointer; font-size: 13px; color: var(--gray-700);
  transition: background 0.12s;
}
.cal-nav button:hover { background: var(--gray-100); }
.cal-range-label { font-size: 15px; font-weight: 600; color: var(--gray-800); }

.cal-dow-row {
  display: grid; grid-template-columns: repeat(7, 1fr);
  margin-bottom: 5px; padding-bottom: 6px;
  border-bottom: 1px solid var(--gray-200);
}
.cal-dow {
  text-align: center; font-size: 11px; font-weight: 500;
  color: var(--gray-400); padding: 2px 0;
}
.cal-dow.weekend { color: #C0392B; }

.fw-grid { display: flex; flex-direction: column; gap: 5px; }
.fw-week-label {
  font-size: 10px; color: var(--gray-400);
  padding: 2px 4px; margin-bottom: -3px;
}
.fw-week-label.cur { color: var(--primary); font-weight: 600; }
.fw-week { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }

.fw-cell {
  min-height: 76px; border-radius: var(--radius-sm);
  border: 1px solid var(--gray-200); background: #fff;
  padding: 6px 7px; display: flex; flex-direction: column; gap: 3px;
  transition: border-color 0.12s, box-shadow 0.12s;
}
.fw-cell.clickable { cursor: pointer; }
.fw-cell.clickable:hover { border-color: var(--primary-mid); box-shadow: 0 2px 6px rgba(24,95,165,0.08); }
.fw-cell.weekend { background: #fafafa; }
.fw-cell.past { background: var(--gray-50); }
.fw-cell.past .fw-date { color: var(--gray-400); }
.fw-cell.today { border: 1.5px solid var(--primary); background: var(--primary-light); }
.fw-cell.today .fw-date-wrap {
  background: var(--primary); color: #fff;
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
}

.fw-date { font-size: 13px; font-weight: 500; color: var(--gray-700); line-height: 1; }
.fw-cell.weekend .fw-date { color: #C0392B; }
.fw-cell.today .fw-date { color: #fff; }

.fw-month-chip {
  font-size: 8px; color: var(--gray-400);
  background: var(--gray-100); padding: 0 4px;
  border-radius: 3px; display: inline-block; margin-bottom: 1px;
  line-height: 14px;
}
.fw-events { display: flex; flex-direction: column; gap: 2px; margin-top: 2px; flex: 1; }
.fw-event {
  font-size: 9px; padding: 2px 5px; border-radius: 3px;
  line-height: 1.35; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.fw-event.sub  { background: #E6F1FB; color: #0C447C; }
.fw-event.home { background: #FAEEDA; color: #633806; }
.fw-more { font-size: 9px; color: var(--gray-400); padding: 0 2px; }

/* ── Detail modal ── */
.detail-records { display: flex; flex-direction: column; gap: 10px; }
.detail-record { border: 1px solid var(--gray-200); border-radius: var(--radius-sm); padding: 12px; }
.detail-row { display: flex; gap: 8px; margin-bottom: 4px; font-size: 13px; align-items: center; }
.detail-label { color: var(--gray-500); min-width: 60px; flex-shrink: 0; font-size: 12px; }
.detail-val { color: var(--gray-900); }
.node-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.node-chip { font-size: 10px; padding: 2px 7px; border-radius: 20px; background: var(--gray-100); color: var(--gray-700); border: 1px solid var(--gray-200); }

/* ── Teacher popup ── */
.teacher-popup {
  position: fixed; z-index: 300; background: #fff;
  border: 1px solid var(--gray-200); border-radius: var(--radius);
  padding: 16px; width: 264px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12); display: none;
}
.popup-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.popup-avatar {
  width: 38px; height: 38px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; flex-shrink: 0;
}
.popup-avatar.male   { background: var(--primary-light); color: var(--primary); }
.popup-avatar.female { background: #FBEAF0; color: var(--female); }
.popup-name  { font-size: 15px; font-weight: 600; }
.popup-field { display: flex; gap: 6px; font-size: 12px; padding: 3px 0; }
.popup-field .lbl { color: var(--gray-500); min-width: 52px; flex-shrink: 0; }
.popup-field .val { color: var(--gray-800); word-break: break-all; }
.popup-section { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--gray-100); }
.popup-section-title { font-size: 10px; color: var(--gray-400); letter-spacing: 0.5px; margin-bottom: 6px; }
.upcoming-dates { display: flex; flex-wrap: wrap; gap: 4px; }
.upcoming-date { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: var(--primary-light); color: var(--primary); }
.restriction-note { font-size: 11px; color: var(--warning); background: var(--warning-light); padding: 4px 8px; border-radius: 4px; margin-top: 6px; }
</style>
</head>
<body>

<div class="pw-screen" id="pw-screen">
  <div class="pw-logo">新莊國小</div>
  <div class="pw-school">代理代課管理系統</div>
  <div style="font-size:12px;color:var(--gray-500);">請輸入校內密碼以繼續</div>
  <div class="pw-box">
    <input type="password" class="pw-input" id="pw-input" placeholder="••••••••" autocomplete="off">
    <button class="btn btn-primary" id="pw-btn">進入</button>
  </div>
  <div class="pw-error" id="pw-error"></div>
</div>

<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="school">高雄市左營區</div>
      <div class="system">新莊國小代課系統</div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer" id="sidebar-footer"></div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <div>
        <div class="topbar-title">代課總覽</div>
        <div class="topbar-sub" id="topbar-sub"></div>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-secondary btn-sm" id="btn-today">回到本週</button>
        <a href="pages/register.html" class="btn btn-primary btn-sm" id="btn-register" style="display:none">＋ 新增代課</a>
      </div>
    </div>

    <div class="page-body">
      <div class="home-grid">

        <!-- Left: teacher list -->
        <div class="teacher-panel card" style="padding:14px;">
          <div class="card-title">👩‍🏫 代課老師名單</div>
          <div class="filter-bar">
            <button class="filter-toggle active" id="toggle-hide-busy">隱藏今日已代課</button>
          </div>
          <div class="teacher-list" id="teacher-list">
            <div class="text-muted text-sm" style="padding:8px">載入中…</div>
          </div>
        </div>

        <!-- Right: 4-week calendar -->
        <div>
          <div class="cal-header">
            <div class="cal-nav">
              <button id="btn-prev">‹ 上一週</button>
              <button id="btn-next">下一週 ›</button>
            </div>
            <div class="cal-range-label" id="cal-range-label"></div>
            <button class="btn btn-secondary btn-sm" id="btn-today2" style="margin-left:auto">回到本週</button>
          </div>

          <!-- 日一二三四五六 -->
          <div class="cal-dow-row">
            <div class="cal-dow weekend">日</div>
            <div class="cal-dow">一</div>
            <div class="cal-dow">二</div>
            <div class="cal-dow">三</div>
            <div class="cal-dow">四</div>
            <div class="cal-dow">五</div>
            <div class="cal-dow weekend">六</div>
          </div>

          <div class="fw-grid" id="fw-grid"></div>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- Day detail modal -->
<div class="modal-backdrop hidden" id="day-modal">
  <div class="modal" style="max-width:520px">
    <div class="modal-header">
      <div class="modal-title" id="day-modal-title">代課詳情</div>
      <button class="modal-close" id="day-modal-close">✕</button>
    </div>
    <div class="detail-records" id="day-modal-body"></div>
  </div>
</div>

<!-- Teacher popup -->
<div class="teacher-popup" id="teacher-popup"></div>

<script type="module">
import { initLayout } from "./js/layout.js";
import { db } from "./js/firebase-config.js";
import { isAdmin } from "./js/auth.js";
import {
  collection, query, where, getDocs, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

initLayout("home");

// ── Helpers ────────────────────────────────────────────────────
const DOW_ZH = ["日","一","二","三","四","五","六"];

function toYMD(d) {
  return d.getFullYear() + "-" +
    String(d.getMonth()+1).padStart(2,"0") + "-" +
    String(d.getDate()).padStart(2,"0");
}
function parseYMD(s) {
  const [y,m,d] = s.split("-").map(Number);
  return new Date(y, m-1, d);
}
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }

// Get Sunday of the week containing d
function getSundayOf(d) {
  const r = new Date(d);
  r.setDate(r.getDate() - r.getDay()); // getDay()==0 for Sun → no shift
  return r;
}

// ── State ──────────────────────────────────────────────────────
// anchorSunday = the Sunday of the "current week" row (row 2 of 4)
let anchorSunday = getSundayOf(new Date());
let hideBusy     = true;
let allTeachers  = [];
let recordsByDate = {};
let todayBusy    = new Set();

// ── Fetch ──────────────────────────────────────────────────────
async function fetchTeachers() {
  const snap = await getDocs(collection(db, "teachers"));
  allTeachers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

async function fetchRecords() {
  // fetch 4 weeks: from (anchorSunday - 7) to (anchorSunday + 20)
  const from = toYMD(addDays(anchorSunday, -7));
  const to   = toYMD(addDays(anchorSunday, 20));
  const q = query(
    collection(db, "records"),
    where("date", ">=", from),
    where("date", "<=", to)
  );
  const snap = await getDocs(q);
  recordsByDate = {};
  snap.docs.forEach(d => {
    const r = { id: d.id, ...d.data() };
    if (!recordsByDate[r.date]) recordsByDate[r.date] = [];
    recordsByDate[r.date].push(r);
  });
}

async function fetchUpcomingForTeacher(tid) {
  const today = toYMD(new Date());
  const q = query(
    collection(db, "records"),
    where("subTeacherId", "==", tid),
    where("date", ">=", today),
    orderBy("date")
  );
  const snap = await getDocs(q);
  return snap.docs.map(d => d.data().date);
}

// ── Render calendar ────────────────────────────────────────────
function renderCalendar() {
  const todayStr = toYMD(new Date());
  const grid = document.getElementById("fw-grid");
  grid.innerHTML = "";

  // 4 weeks: row0 = anchorSunday-7, row1 = anchorSunday, row2 = +7, row3 = +14
  const weekStarts = [
    addDays(anchorSunday, -7),
    anchorSunday,
    addDays(anchorSunday, 7),
    addDays(anchorSunday, 14),
  ];

  // Build range label from first Sunday to last Saturday
  const firstDay = weekStarts[0];
  const lastDay  = addDays(weekStarts[3], 6);
  const sameYear = firstDay.getFullYear() === lastDay.getFullYear();
  const sameMonth = firstDay.getMonth() === lastDay.getMonth();
  let rangeLabel;
  if (sameMonth) {
    rangeLabel = `${firstDay.getFullYear()} 年 ${firstDay.getMonth()+1} 月`;
  } else if (sameYear) {
    rangeLabel = `${firstDay.getFullYear()} 年 ${firstDay.getMonth()+1} 月 / ${lastDay.getMonth()+1} 月`;
  } else {
    rangeLabel = `${firstDay.getFullYear()}/${firstDay.getMonth()+1} ～ ${lastDay.getFullYear()}/${lastDay.getMonth()+1}`;
  }
  document.getElementById("cal-range-label").textContent = rangeLabel;
  document.getElementById("topbar-sub").textContent = rangeLabel;

  const weekLabels = ["↑ 上週", "→ 本週", "↓ 下週", "↓ 下下週"];

  weekStarts.forEach((sunday, wi) => {
    // Week label
    const lbl = document.createElement("div");
    lbl.className = "fw-week-label" + (wi === 1 ? " cur" : "");
    lbl.textContent = weekLabels[wi];
    grid.appendChild(lbl);

    const weekRow = document.createElement("div");
    weekRow.className = "fw-week";

    for (let di = 0; di < 7; di++) {
      const date = addDays(sunday, di);
      const ds   = toYMD(date);
      const dow  = date.getDay(); // 0=Sun,6=Sat
      const isWeekend = dow === 0 || dow === 6;
      const isToday   = ds === todayStr;
      const isPast    = ds < todayStr;
      const recs = recordsByDate[ds] || [];

      // Show month chip if 1st of month or first cell of the 4-week view
      const showMonthChip = date.getDate() === 1 || (wi === 0 && di === 0);

      const cell = document.createElement("div");
      cell.className = "fw-cell" +
        (isWeekend ? " weekend" : "") +
        (isPast && !isToday ? " past" : "") +
        (isToday ? " today" : "") +
        (recs.length ? " clickable" : "");

      const SHOW = 2;
      const shown = recs.slice(0, SHOW);
      const more  = recs.length - SHOW;

      cell.innerHTML = `
        ${showMonthChip ? `<div class="fw-month-chip">${date.getMonth()+1}月</div>` : ""}
        <div class="fw-date-wrap">
          <div class="fw-date">${date.getDate()}</div>
        </div>
        <div class="fw-events">
          ${shown.map(r => `
            <div class="fw-event ${r.subType === "homeroom" ? "home" : "sub"}"
                 title="${r.absentName||""}→${r.subName||""}">
              ${r.absentName||"?"}→${r.subName||"?"}
            </div>`).join("")}
          ${more > 0 ? `<div class="fw-more">還有 ${more} 筆…</div>` : ""}
        </div>`;

      if (recs.length) cell.addEventListener("click", () => showDayModal(ds, recs));
      weekRow.appendChild(cell);
    }

    grid.appendChild(weekRow);
  });
}

// ── Render teachers ────────────────────────────────────────────
function renderTeachers() {
  const todayStr = toYMD(new Date());
  const todayDow = new Date().getDay();
  todayBusy = new Set((recordsByDate[todayStr] || []).map(r => r.subTeacherId));

  const list = document.getElementById("teacher-list");
  const visible = allTeachers.filter(t => {
    if (t.disabledFrom && t.disabledTo &&
        todayStr >= t.disabledFrom && todayStr <= t.disabledTo) return false;
    if (t.blockedDays?.includes(todayDow)) return false;
    if (hideBusy && todayBusy.has(t.id)) return false;
    return true;
  });

  if (!visible.length) {
    list.innerHTML = `<div class="text-muted text-sm" style="padding:8px">目前無可聯絡的代課老師</div>`;
    return;
  }

  list.innerHTML = "";
  visible.forEach(t => {
    const busy = todayBusy.has(t.id);
    const nameClass = t.gender === "female" ? "name-female" : "name-male";
    const todayRec = (recordsByDate[todayStr] || []).find(r => r.subTeacherId === t.id);

    const div = document.createElement("div");
    div.className = "teacher-row" + (busy ? " has-class" : "");
    div.innerHTML = `
      <span class="light ${busy ? "light-green" : "light-gray"}"></span>
      <div style="flex:1;min-width:0">
        <div class="teacher-name ${nameClass}">${t.name}</div>
        ${busy && todayRec
          ? `<div class="teacher-today">▸ ${todayRec.className||""}</div>`
          : `<div class="teacher-meta">${t.subjects||"—"}</div>`}
      </div>`;
    div.addEventListener("click", e => showTeacherPopup(e, t));
    list.appendChild(div);
  });
}

// ── Teacher popup ──────────────────────────────────────────────
async function showTeacherPopup(e, t) {
  const popup = document.getElementById("teacher-popup");
  const upcoming = await fetchUpcomingForTeacher(t.id);
  const blockedText = t.blockedDays?.length
    ? "每週" + t.blockedDays.map(d => DOW_ZH[d]).join("、") + " 不可代課" : "";
  const disabledText = (t.disabledFrom && t.disabledTo)
    ? `${t.disabledFrom} ～ ${t.disabledTo} 停用中` : "";

  popup.innerHTML = `
    <div class="popup-header">
      <div class="popup-avatar ${t.gender === "female" ? "female" : "male"}">${t.name.slice(0,2)}</div>
      <div>
        <div class="popup-name ${t.gender === "female" ? "name-female" : "name-male"}">${t.name}</div>
        <div class="text-xs text-muted">${t.eduLabel||""}</div>
      </div>
    </div>
    ${t.dailyWage ? `<div class="popup-field"><span class="lbl">日薪</span><span class="val">${t.dailyWage.toLocaleString()} 元</span></div>` : ""}
    ${t.subjects  ? `<div class="popup-field"><span class="lbl">可代科目</span><span class="val">${t.subjects}</span></div>` : ""}
    ${t.phone     ? `<div class="popup-field"><span class="lbl">電話</span><span class="val">${t.phone}</span></div>` : ""}
    ${t.email     ? `<div class="popup-field"><span class="lbl">Email</span><span class="val">${t.email}</span></div>` : ""}
    ${t.lineId    ? `<div class="popup-field"><span class="lbl">Line ID</span><span class="val">${t.lineId}</span></div>` : ""}
    ${upcoming.length ? `
      <div class="popup-section">
        <div class="popup-section-title">已排定代課日</div>
        <div class="upcoming-dates">${upcoming.map(d=>`<span class="upcoming-date">${d}</span>`).join("")}</div>
      </div>` : ""}
    ${blockedText  ? `<div class="restriction-note">⚠ ${blockedText}</div>`  : ""}
    ${disabledText ? `<div class="restriction-note">🔴 ${disabledText}</div>` : ""}`;

  popup.style.display = "block";
  const rect = e.currentTarget.getBoundingClientRect();
  let left = rect.right + 8;
  if (left + 264 > window.innerWidth) left = rect.left - 272;
  popup.style.left = left + "px";
  popup.style.top = Math.min(rect.top, window.innerHeight - 320) + "px";
}

document.addEventListener("click", e => {
  const popup = document.getElementById("teacher-popup");
  if (!popup.contains(e.target) && !e.target.closest(".teacher-row"))
    popup.style.display = "none";
});

// ── Day modal ──────────────────────────────────────────────────
function showDayModal(ds, recs) {
  const d = parseYMD(ds);
  document.getElementById("day-modal-title").textContent =
    `${d.getMonth()+1} 月 ${d.getDate()} 日（週${DOW_ZH[d.getDay()]}）代課明細`;

  document.getElementById("day-modal-body").innerHTML = recs.map(r => `
    <div class="detail-record">
      <div class="detail-row">
        <span class="detail-label">請假老師</span>
        <span class="detail-val">${r.absentName||"—"}</span>
        <span class="tag tag-gray" style="margin-left:auto;font-size:10px">${r.leaveType||"—"}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">代課老師</span>
        <span class="detail-val">${r.subName||"—"}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">班級</span>
        <span class="detail-val">${r.className||"—"}</span>
        <span class="detail-label" style="margin-left:8px">科目</span>
        <span class="detail-val">${r.subject||"—"}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">代課類型</span>
        <span class="detail-val">${r.subType==="homeroom" ? "代導師班（日薪）" : "代科任（鐘點）"}</span>
      </div>
      ${r.subType !== "homeroom" && r.sessions?.length ? `
        <div class="node-chips">
          ${r.sessions.map(s=>`<span class="node-chip">第 ${s} 節</span>`).join("")}
        </div>` : ""}
      ${r.notes ? `<div class="detail-row mt-4"><span class="detail-label">備註</span><span class="detail-val">${r.notes}</span></div>` : ""}
      <div class="detail-row mt-4">
        <span class="tag ${r.fundType==="public" ? "tag-blue" : "tag-amber"}">
          ${r.fundType==="public" ? "公費" : "自費"}
        </span>
      </div>
    </div>`).join("");

  document.getElementById("day-modal").classList.remove("hidden");
}

document.getElementById("day-modal-close").addEventListener("click", () =>
  document.getElementById("day-modal").classList.add("hidden"));
document.getElementById("day-modal").addEventListener("click", e => {
  if (e.target === e.currentTarget) e.currentTarget.classList.add("hidden");
});

// ── Navigation ─────────────────────────────────────────────────
function goWeek(n) { anchorSunday = addDays(anchorSunday, n*7); loadAll(); }

document.getElementById("btn-prev").addEventListener("click",   () => goWeek(-1));
document.getElementById("btn-next").addEventListener("click",   () => goWeek(1));
document.getElementById("btn-today").addEventListener("click",  () => { anchorSunday = getSundayOf(new Date()); loadAll(); });
document.getElementById("btn-today2").addEventListener("click", () => { anchorSunday = getSundayOf(new Date()); loadAll(); });

document.getElementById("toggle-hide-busy").addEventListener("click", e => {
  hideBusy = !hideBusy;
  e.target.classList.toggle("active", hideBusy);
  renderTeachers();
});

// ── Load ───────────────────────────────────────────────────────
async function loadAll() {
  await Promise.all([fetchTeachers(), fetchRecords()]);
  renderCalendar();
  renderTeachers();
  setTimeout(() => {
    if (isAdmin()) document.getElementById("btn-register").style.display = "";
  }, 1500);
}

loadAll();
</script>
</body>
</html>
