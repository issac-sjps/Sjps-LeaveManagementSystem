<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>代課管理系統｜新莊國小</title>
<link rel="stylesheet" href="css/main.css">
<style>
.home-grid {
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: 16px;
  align-items: start;
}

/* ── Teacher sidebar ── */
.teacher-panel { position: sticky; top: calc(var(--topbar-h) + 20px); }
.teacher-list { display: flex; flex-direction: column; gap: 4px; max-height: calc(100vh - 200px); overflow-y: auto; padding-right: 2px; }
.teacher-row {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: var(--radius-sm);
  cursor: pointer; border: 1px solid transparent;
  transition: background 0.12s, border-color 0.12s;
}
.teacher-row:hover { background: var(--gray-50); border-color: var(--gray-200); }
.teacher-row.has-class { background: var(--success-light); }
.teacher-name { font-size: 13px; font-weight: 500; flex: 1; }
.teacher-meta { font-size: 10px; color: var(--gray-500); }
.teacher-today { font-size: 10px; color: var(--success); }
.filter-bar { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
.filter-toggle {
  font-size: 11px; padding: 3px 10px; border-radius: 20px;
  border: 1px solid var(--gray-300); background: #fff;
  cursor: pointer; color: var(--gray-600); transition: all 0.12s;
}
.filter-toggle.active { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }

/* ── Month calendar ── */
.cal-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
}
.cal-nav button {
  padding: 5px 12px; border: 1px solid var(--gray-300);
  background: #fff; border-radius: var(--radius-sm);
  cursor: pointer; font-size: 13px; color: var(--gray-700);
  transition: background 0.12s;
}
.cal-nav button:hover { background: var(--gray-100); }
.cal-month-label { font-size: 16px; font-weight: 600; color: var(--gray-800); min-width: 100px; text-align: center; }

.cal-dow-row {
  display: grid; grid-template-columns: repeat(7, 1fr);
  margin-bottom: 6px;
}
.cal-dow-cell {
  text-align: center; font-size: 11px; font-weight: 500;
  color: var(--gray-400); padding: 4px 0;
}
.cal-dow-cell.weekend { color: var(--danger); }

.cal-grid-month {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 5px;
}
.cal-cell {
  min-height: 80px; border-radius: var(--radius-sm);
  border: 1px solid var(--gray-200); background: #fff;
  padding: 6px 7px; cursor: default;
  transition: border-color 0.12s, box-shadow 0.12s;
  display: flex; flex-direction: column; gap: 3px;
}
.cal-cell:not(.empty):not(.other-month):hover {
  border-color: var(--primary-mid);
  box-shadow: 0 2px 6px rgba(24,95,165,0.08);
  cursor: pointer;
}
.cal-cell.empty { background: transparent; border-color: transparent; }
.cal-cell.other-month { background: var(--gray-50); }
.cal-cell.other-month .cal-cell-date { color: var(--gray-300); }
.cal-cell.today { border-color: var(--primary); background: var(--primary-light); }
.cal-cell.today .cal-cell-date {
  color: #fff; background: var(--primary);
  width: 24px; height: 24px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
}
.cal-cell.weekend-day { background: #fafafa; }
.cal-cell.has-records { }
.cal-cell-date { font-size: 13px; font-weight: 500; color: var(--gray-700); margin-bottom: 2px; }
.cal-cell.weekend-day .cal-cell-date { color: var(--danger); }

.cal-event {
  background: var(--primary-light); border-radius: 3px;
  padding: 2px 5px; font-size: 10px; color: var(--primary);
  line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.cal-event.homeroom { background: var(--warning-light); color: var(--warning); }
.cal-more { font-size: 10px; color: var(--gray-400); padding: 1px 3px; }

/* ── Detail modal ── */
.detail-records { display: flex; flex-direction: column; gap: 10px; }
.detail-record {
  border: 1px solid var(--gray-200); border-radius: var(--radius-sm); padding: 12px;
}
.detail-row { display: flex; gap: 8px; margin-bottom: 4px; font-size: 13px; align-items: center; }
.detail-label { color: var(--gray-500); min-width: 60px; flex-shrink: 0; font-size: 12px; }
.detail-val { color: var(--gray-900); }
.node-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.node-chip {
  font-size: 10px; padding: 2px 7px; border-radius: 20px;
  background: var(--gray-100); color: var(--gray-700); border: 1px solid var(--gray-200);
}

/* ── Teacher popup ── */
.teacher-popup {
  position: fixed; z-index: 300; background: #fff;
  border: 1px solid var(--gray-200); border-radius: var(--radius);
  padding: 16px; width: 260px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12); display: none;
}
.popup-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.popup-avatar {
  width: 38px; height: 38px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; flex-shrink: 0;
}
.popup-avatar.male { background: var(--primary-light); color: var(--primary); }
.popup-avatar.female { background: #FBEAF0; color: var(--female); }
.popup-name { font-size: 15px; font-weight: 600; }
.popup-field { display: flex; gap: 6px; font-size: 12px; padding: 3px 0; }
.popup-field .lbl { color: var(--gray-500); min-width: 50px; flex-shrink: 0; }
.popup-field .val { color: var(--gray-800); word-break: break-all; }
.popup-section { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--gray-100); }
.popup-section-title { font-size: 10px; color: var(--gray-400); font-weight: 500; letter-spacing: 0.5px; margin-bottom: 6px; }
.upcoming-dates { display: flex; flex-wrap: wrap; gap: 4px; }
.upcoming-date { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: var(--primary-light); color: var(--primary); }
.restriction-note { font-size: 11px; color: var(--warning); background: var(--warning-light); padding: 4px 8px; border-radius: 4px; margin-top: 6px; }
</style>
</head>
<body>

<!-- Password screen -->
<div class="pw-screen" id="pw-screen">
  <div class="pw-logo">新莊國小</div>
  <div class="pw-school">代理代課管理系統</div>
  <div style="font-size:12px;color:var(--gray-500);">請輸入校內密碼以繼續</div>
  <div class="pw-box">
    <input type="password" class="pw-input" id="pw-input" placeholder="••••••••" autocomplete="off">
    <button class="btn btn-primary" id="pw-btn">進入</button>
  </div>
  <div class="pw-error" id="pw-error"></div>
</div>

<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="school">高雄市左營區</div>
      <div class="system">新莊國小代課系統</div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer" id="sidebar-footer"></div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <div>
        <div class="topbar-title">代課總覽</div>
        <div class="topbar-sub" id="topbar-sub"></div>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-secondary btn-sm" id="btn-today">回到本月</button>
        <a href="pages/register.html" class="btn btn-primary btn-sm" id="btn-register" style="display:none">＋ 新增代課</a>
      </div>
    </div>

    <div class="page-body">
      <div class="home-grid">

        <!-- Left: teacher list -->
        <div class="teacher-panel card" style="padding:14px;">
          <div class="card-title">👩‍🏫 代課老師名單</div>
          <div class="filter-bar">
            <button class="filter-toggle active" id="toggle-hide-busy">隱藏今日已代課</button>
          </div>
          <div class="teacher-list" id="teacher-list">
            <div class="text-muted text-sm" style="padding:8px">載入中…</div>
          </div>
        </div>

        <!-- Right: month calendar -->
        <div>
          <div class="cal-header">
            <div class="cal-nav" style="display:flex;gap:4px">
              <button id="btn-prev">‹ 上個月</button>
              <button id="btn-next">下個月 ›</button>
            </div>
            <div class="cal-month-label" id="cal-month-label"></div>
          </div>

          <!-- Day-of-week header -->
          <div class="cal-dow-row">
            <div class="cal-dow-cell weekend">日</div>
            <div class="cal-dow-cell">一</div>
            <div class="cal-dow-cell">二</div>
            <div class="cal-dow-cell">三</div>
            <div class="cal-dow-cell">四</div>
            <div class="cal-dow-cell">五</div>
            <div class="cal-dow-cell weekend">六</div>
          </div>

          <div class="cal-grid-month" id="cal-grid-month"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Day detail modal -->
<div class="modal-backdrop hidden" id="day-modal">
  <div class="modal" style="max-width:520px">
    <div class="modal-header">
      <div class="modal-title" id="day-modal-title">代課詳情</div>
      <button class="modal-close" id="day-modal-close">✕</button>
    </div>
    <div class="detail-records" id="day-modal-body"></div>
  </div>
</div>

<!-- Teacher popup -->
<div class="teacher-popup" id="teacher-popup"></div>

<script type="module">
import { initLayout } from "./js/layout.js";
import { db } from "./js/firebase-config.js";
import { isAdmin } from "./js/auth.js";
import {
  collection, query, where, getDocs, orderBy
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

initLayout("home");

// ── Helpers ────────────────────────────────────────────────────
const DAYS_ZH = ["日","一","二","三","四","五","六"];
const MONTHS_ZH = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];

function toYMD(d) {
  return d.getFullYear() + "-" +
    String(d.getMonth()+1).padStart(2,"0") + "-" +
    String(d.getDate()).padStart(2,"0");
}
function parseYMD(s) {
  const [y,m,d] = s.split("-").map(Number);
  return new Date(y, m-1, d);
}

// ── State ──────────────────────────────────────────────────────
let viewYear  = new Date().getFullYear();
let viewMonth = new Date().getMonth(); // 0-indexed
let hideBusy  = true;
let allTeachers    = [];
let recordsByDate  = {};
let todayBusy      = new Set();

// ── Fetch ──────────────────────────────────────────────────────
async function fetchTeachers() {
  const snap = await getDocs(collection(db, "teachers"));
  allTeachers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

async function fetchRecordsForMonth() {
  const from = `${viewYear}-${String(viewMonth+1).padStart(2,"0")}-01`;
  const lastDay = new Date(viewYear, viewMonth+1, 0).getDate();
  const to = `${viewYear}-${String(viewMonth+1).padStart(2,"0")}-${lastDay}`;
  const q = query(
    collection(db, "records"),
    where("date", ">=", from),
    where("date", "<=", to)
  );
  const snap = await getDocs(q);
  recordsByDate = {};
  snap.docs.forEach(d => {
    const r = { id: d.id, ...d.data() };
    if (!recordsByDate[r.date]) recordsByDate[r.date] = [];
    recordsByDate[r.date].push(r);
  });
}

async function fetchUpcomingForTeacher(tid) {
  const today = toYMD(new Date());
  const q = query(
    collection(db, "records"),
    where("subTeacherId", "==", tid),
    where("date", ">=", today),
    orderBy("date")
  );
  const snap = await getDocs(q);
  return snap.docs.map(d => d.data().date);
}

// ── Render calendar ────────────────────────────────────────────
function renderCalendar() {
  const todayStr  = toYMD(new Date());
  const todayDate = new Date();

  document.getElementById("cal-month-label").textContent =
    `${viewYear} 年 ${MONTHS_ZH[viewMonth]}`;
  document.getElementById("topbar-sub").textContent =
    `${viewYear} 年 ${viewMonth+1} 月`;

  const firstDay = new Date(viewYear, viewMonth, 1).getDay(); // 0=Sun
  const lastDate = new Date(viewYear, viewMonth+1, 0).getDate();
  const prevLastDate = new Date(viewYear, viewMonth, 0).getDate();

  const grid = document.getElementById("cal-grid-month");
  grid.innerHTML = "";

  // leading blank cells (prev month)
  for (let i = 0; i < firstDay; i++) {
    const d = prevLastDate - firstDay + 1 + i;
    const cell = document.createElement("div");
    cell.className = "cal-cell other-month";
    cell.innerHTML = `<div class="cal-cell-date">${d}</div>`;
    grid.appendChild(cell);
  }

  // current month days
  for (let d = 1; d <= lastDate; d++) {
    const date = new Date(viewYear, viewMonth, d);
    const ds   = toYMD(date);
    const dow  = date.getDay(); // 0=Sun,6=Sat
    const isToday   = ds === todayStr;
    const isWeekend = dow === 0 || dow === 6;
    const recs = recordsByDate[ds] || [];

    const cell = document.createElement("div");
    cell.className = "cal-cell" +
      (isToday   ? " today"       : "") +
      (isWeekend ? " weekend-day" : "") +
      (recs.length ? " has-records" : "");

    const SHOW = 2;
    const shown = recs.slice(0, SHOW);
    const more  = recs.length - SHOW;

    cell.innerHTML = `
      <div class="cal-cell-date">${d}</div>
      ${shown.map(r => `
        <div class="cal-event ${r.subType === "homeroom" ? "homeroom" : ""}" title="${r.absentName||""} → ${r.subName||""}">
          ${r.absentName||"?"} → ${r.subName||"?"}
        </div>`).join("")}
      ${more > 0 ? `<div class="cal-more">還有 ${more} 筆…</div>` : ""}`;

    if (recs.length) {
      cell.addEventListener("click", () => showDayModal(ds, recs));
    }
    grid.appendChild(cell);
  }

  // trailing blank cells (next month)
  const total = firstDay + lastDate;
  const trailing = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let d = 1; d <= trailing; d++) {
    const cell = document.createElement("div");
    cell.className = "cal-cell other-month";
    cell.innerHTML = `<div class="cal-cell-date">${d}</div>`;
    grid.appendChild(cell);
  }
}

// ── Render teachers ────────────────────────────────────────────
function renderTeachers() {
  const todayStr = toYMD(new Date());
  const todayDow = new Date().getDay();
  todayBusy = new Set((recordsByDate[todayStr] || []).map(r => r.subTeacherId));

  const list = document.getElementById("teacher-list");
  const visible = allTeachers.filter(t => {
    if (t.disabledFrom && t.disabledTo && todayStr >= t.disabledFrom && todayStr <= t.disabledTo) return false;
    if (t.blockedDays && t.blockedDays.includes(todayDow)) return false;
    if (hideBusy && todayBusy.has(t.id)) return false;
    return true;
  });

  if (!visible.length) {
    list.innerHTML = `<div class="text-muted text-sm" style="padding:8px">目前無可聯絡的代課老師</div>`;
    return;
  }

  list.innerHTML = "";
  visible.forEach(t => {
    const busy = todayBusy.has(t.id);
    const nameClass = t.gender === "female" ? "name-female" : "name-male";
    const light = busy ? "light-green" : "light-gray";
    const todayRec = (recordsByDate[todayStr] || []).find(r => r.subTeacherId === t.id);

    const div = document.createElement("div");
    div.className = "teacher-row" + (busy ? " has-class" : "");
    div.innerHTML = `
      <span class="light ${light}"></span>
      <div style="flex:1;min-width:0">
        <div class="teacher-name ${nameClass}">${t.name}</div>
        ${busy && todayRec
          ? `<div class="teacher-today">▸ ${todayRec.className||""}</div>`
          : `<div class="teacher-meta">${t.subjects||"—"}</div>`}
      </div>`;
    div.addEventListener("click", e => showTeacherPopup(e, t));
    list.appendChild(div);
  });
}

// ── Teacher popup ──────────────────────────────────────────────
async function showTeacherPopup(e, t) {
  const popup = document.getElementById("teacher-popup");
  const upcoming = await fetchUpcomingForTeacher(t.id);
  const dayNames = ["日","一","二","三","四","五","六"];
  const blockedText = t.blockedDays?.length
    ? "每週" + t.blockedDays.map(d => dayNames[d]).join("、") + " 不可代課" : "";
  const disabledText = (t.disabledFrom && t.disabledTo)
    ? `${t.disabledFrom} ～ ${t.disabledTo} 停用中` : "";

  popup.innerHTML = `
    <div class="popup-header">
      <div class="popup-avatar ${t.gender === "female" ? "female" : "male"}">${t.name.slice(0,2)}</div>
      <div>
        <div class="popup-name ${t.gender === "female" ? "name-female" : "name-male"}">${t.name}</div>
        <div class="text-xs text-muted">${t.eduLabel||""}</div>
      </div>
    </div>
    ${t.dailyWage ? `<div class="popup-field"><span class="lbl">日薪</span><span class="val">${t.dailyWage} 元</span></div>` : ""}
    ${t.subjects ? `<div class="popup-field"><span class="lbl">可代科目</span><span class="val">${t.subjects}</span></div>` : ""}
    ${t.phone  ? `<div class="popup-field"><span class="lbl">電話</span><span class="val">${t.phone}</span></div>` : ""}
    ${t.email  ? `<div class="popup-field"><span class="lbl">Email</span><span class="val">${t.email}</span></div>` : ""}
    ${t.lineId ? `<div class="popup-field"><span class="lbl">Line ID</span><span class="val">${t.lineId}</span></div>` : ""}
    ${upcoming.length ? `
      <div class="popup-section">
        <div class="popup-section-title">已排定代課日</div>
        <div class="upcoming-dates">${upcoming.map(d=>`<span class="upcoming-date">${d}</span>`).join("")}</div>
      </div>` : ""}
    ${blockedText  ? `<div class="restriction-note">⚠ ${blockedText}</div>`  : ""}
    ${disabledText ? `<div class="restriction-note">🔴 ${disabledText}</div>` : ""}`;

  popup.style.display = "block";
  const rect = e.currentTarget.getBoundingClientRect();
  let left = rect.right + 8;
  if (left + 260 > window.innerWidth) left = rect.left - 268;
  popup.style.left = left + "px";
  popup.style.top  = Math.min(rect.top, window.innerHeight - 300) + "px";
}

document.addEventListener("click", e => {
  const popup = document.getElementById("teacher-popup");
  if (!popup.contains(e.target) && !e.target.closest(".teacher-row")) popup.style.display = "none";
});

// ── Day modal ──────────────────────────────────────────────────
function showDayModal(ds, recs) {
  const d = parseYMD(ds);
  document.getElementById("day-modal-title").textContent =
    `${d.getMonth()+1} 月 ${d.getDate()} 日（週${DAYS_ZH[d.getDay()]}）代課明細`;

  document.getElementById("day-modal-body").innerHTML = recs.map(r => `
    <div class="detail-record">
      <div class="detail-row">
        <span class="detail-label">請假老師</span>
        <span class="detail-val">${r.absentName||"—"}</span>
        <span class="tag tag-gray" style="margin-left:auto;font-size:10px">${r.leaveType||"—"}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">代課老師</span>
        <span class="detail-val">${r.subName||"—"}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">班級</span>
        <span class="detail-val">${r.className||"—"}</span>
        <span class="detail-label" style="margin-left:8px">科目</span>
        <span class="detail-val">${r.subject||"—"}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">代課類型</span>
        <span class="detail-val">${r.subType==="homeroom" ? "代導師班（日薪）" : "代科任（鐘點）"}</span>
      </div>
      ${r.subType !== "homeroom" && r.sessions?.length ? `
        <div class="node-chips">
          ${r.sessions.map(s=>`<span class="node-chip">第${s}節</span>`).join("")}
        </div>` : ""}
      ${r.notes ? `<div class="detail-row mt-4"><span class="detail-label">備註</span><span class="detail-val">${r.notes}</span></div>` : ""}
      <div class="detail-row mt-4">
        <span class="tag ${r.fundType==="public" ? "tag-blue" : "tag-amber"}">
          ${r.fundType==="public" ? "公費" : "自費"}
        </span>
      </div>
    </div>`).join("");

  document.getElementById("day-modal").classList.remove("hidden");
}

document.getElementById("day-modal-close").addEventListener("click", () =>
  document.getElementById("day-modal").classList.add("hidden"));
document.getElementById("day-modal").addEventListener("click", e => {
  if (e.target === e.currentTarget) e.currentTarget.classList.add("hidden");
});

// ── Navigation ─────────────────────────────────────────────────
document.getElementById("btn-prev").addEventListener("click", () => {
  if (viewMonth === 0) { viewMonth = 11; viewYear--; } else viewMonth--;
  loadAll();
});
document.getElementById("btn-next").addEventListener("click", () => {
  if (viewMonth === 11) { viewMonth = 0; viewYear++; } else viewMonth++;
  loadAll();
});
document.getElementById("btn-today").addEventListener("click", () => {
  viewYear  = new Date().getFullYear();
  viewMonth = new Date().getMonth();
  loadAll();
});

document.getElementById("toggle-hide-busy").addEventListener("click", e => {
  hideBusy = !hideBusy;
  e.target.classList.toggle("active", hideBusy);
  renderTeachers();
});

// ── Load ───────────────────────────────────────────────────────
async function loadAll() {
  await Promise.all([fetchTeachers(), fetchRecordsForMonth()]);
  renderCalendar();
  renderTeachers();
  setTimeout(() => {
    if (isAdmin()) document.getElementById("btn-register").style.display = "";
  }, 1500);
}

loadAll();
</script>
</body>
</html>
